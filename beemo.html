<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>beemo@dev:~$</title>

<link href="https://fonts.googleapis.com/css2?family=Inconsolata&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #0b0b0c;
  color: #657B83;
  font-family: "Inconsolata", monospace;
  font-size: 2.5vmin;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#Content {
  min-width: 60vmin;
}

#user { color: #C3E88D; }
#dir { color: #80CBC3; }

a {
  color: #ff4da6;
  text-decoration: none;
}

a:hover {
  color: #ff85c1;
  text-shadow: 0 0 5px #ff4da6;
}

.cursor::after {
  content: "▌";
  animation: blink 0.7s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>
</head>

<body>

<div id="content">
  <span id="ps1_01"></span>
  <span id="cd"></span><br>

  <span id="ps1_02"></span>
  <span id="cat"></span><br>

  <span id="output"></span><br>

  <span id="ps1_03"></span>
</div>

<script>
async function typewriter(text, elementId, delay) {
  let i = 0;
  const el = document.getElementById(elementId);

  while (i < text.length) {
    el.innerHTML = text.substring(0, i + 1);
    await new Promise(r => setTimeout(r, delay));
    i++;
  }
}

async function runBeemo() {

  // cd beemo
  await typewriter("<span id='user'>sakura@dev</span>:<span id='dir'>~/</span>$", "ps1_01", 15);
  await typewriter(" cd beemo", "cd", 15);

  // cat about.txt
  await typewriter("<span id='user'>sakura@dev</span>:<span id='dir'>~/beemo</span>$", "ps1_02", 15);
  await typewriter(" cat about.txt", "cat", 15);

  // output (professional intro)
  await typewriter(
    "<br><b>Beemo</b><br><br>" +
    "Beemo is a verified Discord bot built to combat spam and improve server moderation.<br><br>" +
    "Since 2018, it has successfully detected and removed millions of spam accounts,<br>" +
    "helping communities stay safe and organized.<br><br>" +
    "learn more: <a href='https://beemo.gg/' target='_blank'>https://beemo.gg/</a><br>",
    "output",
    15
  );

  // back
  await typewriter(
    "<br><span style='color:#9ca3af'><a href='index.html'>← back</a></span>",
    "ps1_03",
    15
  );
}

runBeemo();
</script>

</body>
</html>
