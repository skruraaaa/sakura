async function typewriter(text, elementId, delay) {
  let i = 0;
  const el = document.getElementById(elementId);

  while (i < text.length) {
    el.innerHTML = text.substring(0, i + 1);
    await new Promise(r => setTimeout(r, delay));
    i++;
  }
}
